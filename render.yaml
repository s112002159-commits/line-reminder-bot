services:
  - type: web

    name: line-reminder-bot

    runtime: python

    plan: free

    buildCommand: pip install -r requirements.txt

    startCommand: gunicorn app:app

    autoDeploy: true

    envVars:

      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false

      - key: LINE_CHANNEL_SECRET
        sync: false

      - key: ADMIN_USERS
        sync: false
